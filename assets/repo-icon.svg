<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="256" viewBox="0 0 1024 256" role="img" aria-label="Overlapping set expressions icon">
  <rect width="1024" height="256" fill="#ffffff"/>

  <g fill="#000000" font-family="Menlo, Consolas, 'Liberation Mono', monospace" font-weight="600" font-size="24">
    <text x="72" y="25" opacity="0.25" transform="rotate(-13 72 25)">A | B = B | A</text>
    <text x="130" y="51" opacity="0.16" transform="rotate(9 130 51)">A &amp; (B | C) = (A &amp; B) | (A &amp; C)</text>
    <text x="60" y="78" opacity="0.12" transform="rotate(-7 60 78)">A - (B | C) = (A - B) &amp; (A - C)</text>
    <text x="210" y="100" opacity="0.20" transform="rotate(14 210 100)">(A - B) | (A &amp; B) = A</text>
    <text x="70" y="124" opacity="0.10" transform="rotate(-18 70 124)">A &amp; B &lt;= A</text>
    <text x="150" y="148" opacity="0.28" transform="rotate(6 150 148)">A &amp; B = B &amp; A</text>
    <text x="40" y="173" opacity="0.14" transform="rotate(-4 40 173)">A | (B &amp; C) = (A | B) &amp; (A | C)</text>
    <text x="260" y="198" opacity="0.22" transform="rotate(11 260 198)">(A - B) &amp; B = {}</text>

    <text x="390" y="20" opacity="0.08" transform="rotate(19 390 20)">A | A = A</text>
    <text x="420" y="43" opacity="0.18" transform="rotate(-10 420 43)">A &amp; A = A</text>
    <text x="450" y="66" opacity="0.11" transform="rotate(15 450 66)">A - A = {}</text>
    <text x="350" y="89" opacity="0.21" transform="rotate(-6 350 89)">A | {} = A</text>
    <text x="390" y="113" opacity="0.09" transform="rotate(12 390 113)">A &amp; {} = {}</text>
    <text x="470" y="135" opacity="0.17" transform="rotate(-16 470 135)">A - {} = A</text>
    <text x="360" y="159" opacity="0.13" transform="rotate(8 360 159)">A &lt;= B  and  B &lt;= A  =&gt;  A = B</text>
    <text x="420" y="185" opacity="0.24" transform="rotate(-9 420 185)">A &amp; (A | B) = A</text>

    <text x="620" y="35" opacity="0.20" transform="rotate(-14 620 35)">A | (A &amp; B) = A</text>
    <text x="560" y="59" opacity="0.12" transform="rotate(7 560 59)">(A | B) - B = A - B</text>
    <text x="610" y="82" opacity="0.26" transform="rotate(-5 610 82)">A - (A &amp; B) = A - B</text>
    <text x="540" y="106" opacity="0.15" transform="rotate(17 540 106)">(A | B) &amp; (A - B) = A - B</text>
    <text x="630" y="130" opacity="0.10" transform="rotate(-8 630 130)">A &amp; (B - A) = {}</text>
    <text x="560" y="154" opacity="0.23" transform="rotate(13 560 154)">(A - B) | (B - A) = symmetric_diff(A,B)</text>
    <text x="620" y="178" opacity="0.14" transform="rotate(-12 620 178)">A &amp; B &lt;= A | B</text>
    <text x="575" y="201" opacity="0.19" transform="rotate(5 575 201)">A | B | C = C | B | A</text>
  </g>
</svg>
